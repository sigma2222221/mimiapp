<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Биржа Заданий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* все ваши стили без изменений (оставьте как есть) */
  </style>
</head>
<body>
  <!-- разметка без изменений (оставьте как есть) -->
  <div class="max-w-md mx-auto pt-6 px-4 space-y-8">...</div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // --- Данные пользователя и заданий ---
    let user = { id: 123456789, first_name: "Пользователь", balance: 0, referralsCount: 0 };
    let tasks = [
      { 
        id: 1, 
        title: "Поставить лайки", 
        reward: 150, 
        max: 1, 
        progress: 0, 
        iconBg: "bg-blue-500", 
        icon: "https://cdn-icons-png.flaticon.com/512/126/126473.png", 
        type: "like", 
        postLink: "https://t.me/durov/123"  // замените на реальный пост
      },
      { 
        id: 2, 
        title: "Подписаться на канал", 
        reward: 350, 
        max: 2, 
        progress: 0, 
        iconBg: "bg-pink-500", 
        icon: "https://cdn-icons-png.flaticon.com/512/733/733553.png", 
        type: "subscribe", 
        link: "https://t.me/+rvjfW6GNbec0ODYy"   // ваша ссылка на канал
      },
      { 
        id: 4, 
        title: "Просмотр рекламы", 
        reward: 750, 
        max: 2, 
        progress: 0, 
        iconBg: "bg-purple-500", 
        icon: "https://cdn-icons-png.flaticon.com/512/1089/1089585.png", 
        type: "video", 
        videoUrl: "https://vk.com/video_ext.php?oid=831736216&id=456242196&hash=0e6c12ea71baefb7"
      },
      { 
        id: 5, 
        title: "Пригласить друзей", 
        reward: 12300, 
        max: 10, 
        progress: 0, 
        iconBg: "bg-amber-500", 
        icon: "https://cdn-icons-png.flaticon.com/512/2920/2920123.png", 
        type: "referral", 
        vip: true 
      }
    ];

    let pendingResponseTimeout = null;

    function showLoading(text = "Проверяем...") {
      document.getElementById('loadingText').innerText = text;
      document.getElementById('loadingOverlay').style.display = 'flex';
    }
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
      if (pendingResponseTimeout) {
        clearTimeout(pendingResponseTimeout);
        pendingResponseTimeout = null;
      }
    }

    function saveData() {
      try { localStorage.setItem("birzha_tasks", JSON.stringify({user, tasks})); } catch(e) {}
    }
    function loadData() {
      try {
        const saved = localStorage.getItem("birzha_tasks");
        if (saved) {
          const d = JSON.parse(saved);
          if (d.user) user = d.user;
          if (d.tasks) tasks = d.tasks;
        }
      } catch(e) {}
      if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        const u = Telegram.WebApp.initDataUnsafe.user;
        user.id = u.id;
        user.first_name = u.first_name || "Пользователь";
      }
      document.getElementById("userName").textContent = user.first_name;
      document.getElementById("balanceTop").textContent = user.balance + " ₽";
    }

    function setupWebAppDataHandler() {
      Telegram.WebApp.onEvent('webAppData', function(data) {
        hideLoading();
        try {
          const response = JSON.parse(data);
          console.log('Ответ бота:', response);

          if (response.action === 'get_balance') {
            user.balance = response.balance;
            document.getElementById("balanceTop").textContent = user.balance + " ₽";
            saveData();
            Telegram.WebApp.showAlert(`Баланс загружен: ${user.balance} ₽`);
          } 
          else if (response.success) {
            user.balance = response.new_balance;
            document.getElementById("balanceTop").textContent = user.balance + " ₽";
            const t = tasks.find(x => x.id === response.task_id);
            if (t && t.progress < t.max) {
              t.progress++;
              renderTasks();
              saveData();
            }
            Telegram.WebApp.showAlert(`✅ Задание выполнено! +${response.reward} ₽`);
          } 
          else {
            Telegram.WebApp.showAlert(`❌ ${response.message || 'Ошибка'}`);
          }
        } catch (e) {
          console.error('Ошибка обработки ответа бота', e);
          Telegram.WebApp.showAlert('Ошибка при обработке ответа');
        }
      });
    }

    function sendBotRequest(data, loadingText = "Проверяем...") {
      Telegram.WebApp.sendData(JSON.stringify(data));
      showLoading(loadingText);
      pendingResponseTimeout = setTimeout(() => {
        hideLoading();
        Telegram.WebApp.showAlert('Бот не отвечает. Попробуйте позже.');
      }, 20000); // таймаут 20 секунд
    }

    // --- Задание "Подписаться на канал" (новая версия с двумя кнопками) ---
    function startSubscribeCheck(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || t.progress >= t.max) return;

      Telegram.WebApp.showPopup({
        title: t.title,
        message: `1. Нажми «Перейти в канал» и подпишись.\n2. После подписки нажми «Проверить».`,
        buttons: [
          { type: "default", text: "🔗 Перейти в канал", id: "open" },
          { type: "default", text: "✅ Проверить", id: "check" },
          { type: "cancel" }
        ]
      }, (btnId) => {
        if (btnId === "open") {
          window.open(t.link, "_blank");
        } else if (btnId === "check") {
          sendBotRequest({
            action: "check_subscribe",
            task_id: t.id,
            user_id: user.id
          }, "Проверяем подписку...");
        }
      });
    }

    // --- Задание "Поставить лайки" (можно оставить как есть) ---
    function startLikeTask(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || t.progress >= t.max) return;
      Telegram.WebApp.showPopup({
        title: t.title,
        message: `Перейди к посту и поставь лайк:\n\n${t.postLink}\n\nПосле нажми "Проверить"`,
        buttons: [
          { type: "default", text: "Перейти к посту", id: "open" },
          { type: "default", text: "Проверить", id: "check" },
          { type: "cancel" }
        ]
      }, (btnId) => {
        if (btnId === "open") {
          window.open(t.postLink, "_blank");
        } else if (btnId === "check") {
          sendBotRequest({
            action: "check_like",
            task_id: t.id,
            user_id: user.id
          }, "Проверяем лайк...");
        }
      });
    }

    // --- Задание "Просмотр рекламы" (видео) ---
    function startVideoTask(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || t.progress >= t.max) return;

      const overlay = document.getElementById('modalOverlay');
      const videoModal = document.createElement('div');
      videoModal.className = 'video-modal';
      videoModal.innerHTML = `
        <div class="close-btn" onclick="closeVideoModal()">✕</div>
        <div class="text-2xl font-bold mb-4">${t.title}</div>
        <div class="video-container">
          ${t.videoUrl.includes('youtube') || t.videoUrl.includes('vk.com') || t.videoUrl.includes('vkvideo.ru')
            ? `<iframe src="${t.videoUrl}" allowfullscreen></iframe>`
            : `<video src="${t.videoUrl}" controls autoplay></video>`}
        </div>
        <button onclick="checkVideoTask(${id})" class="green-btn mt-4">Проверить</button>
      `;
      overlay.innerHTML = '';
      overlay.appendChild(videoModal);
      overlay.classList.remove('hidden');
    }

    function closeVideoModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      document.getElementById('modalOverlay').innerHTML = '';
    }

    function checkVideoTask(id) {
      closeVideoModal();
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      sendBotRequest({
        action: "check_video",
        task_id: t.id,
        user_id: user.id
      }, "Проверяем просмотр...");
    }

    // --- Задание "Пригласить друзей" (рефералка) ---
    function showReferral(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || t.progress >= t.max) return;
      const link = `https://t.me/fjsfjsofjosfjosjfos_bot?start=${user.id}`; // замените на юзернейм вашего бота
      Telegram.WebApp.showPopup({
        title: "Пригласи друзей",
        message: `Твоя ссылка:\n${link}\n\nКаждый друг = +1`,
        buttons: [
          { id: "copy", type: "default", text: "Скопировать" },
          { type: "cancel" }
        ]
      }, (b) => {
        if (b === "copy") {
          navigator.clipboard.writeText(link);
          Telegram.WebApp.showAlert("Скопировано!");
        }
      });
    }

    // --- Рендер выплат и заданий (без изменений) ---
    function renderPayouts() { /* как было */ }
    function renderTasks() {
      const cont = document.getElementById("tasks-container");
      cont.innerHTML = tasks.map(t => {
        const curr = t.type === "referral" ? user.referralsCount : t.progress;
        const done = curr >= t.max;
        let onClickAttr = '';
        let disabledClass = done ? 'disabled' : '';
        if (!done) {
          if (t.type === "like") onClickAttr = `onclick="startLikeTask(${t.id})"`;
          else if (t.type === "subscribe") onClickAttr = `onclick="startSubscribeCheck(${t.id})"`;
          else if (t.type === "video") onClickAttr = `onclick="startVideoTask(${t.id})"`;
          else if (t.type === "referral") onClickAttr = `onclick="showReferral(${t.id})"`;
        }
        const btnHtml = `<div class="task-btn btn-neon ${disabledClass}" ${onClickAttr}>Выполнить</div>`;
        return `
          <div class="task-card ${t.vip ? 'vip-border' : ''}">
            <div class="icon-box ${t.iconBg}"><img src="${t.icon}" class="w-14 h-14 object-contain" alt="${t.title}"></div>
            <div class="task-info">
              <div class="task-title">${t.vip ? '<span class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded font-bold mr-2 neon-border">VIP</span>' : ''}${t.title}</div>
              <div class="task-progress">Выполнено: ${curr} из ${t.max}</div>
            </div>
            <div class="task-right">
              <div class="task-price">${t.reward} ₽</div>
              ${btnHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    // --- Таймер акции ---
    function updateTimer() {
      const end = new Date(2026,1,28,23,59,59);
      const diff = end - new Date();
      if (diff <= 0) return document.getElementById('timerDisplay').innerText = "0д : 00ч : 00м : 00с";
      const d = Math.floor(diff/86400000);
      const h = Math.floor((diff%86400000)/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      document.getElementById('timerDisplay').innerText = `${d}д : ${h.toString().padStart(2,'0')}ч : ${m.toString().padStart(2,'0')}м : ${s.toString().padStart(2,'0')}с`;
    }
    setInterval(updateTimer, 1000);

    // --- Модалки вывода (без изменений) ---
    function showWithdrawModal() { /* как было */ }
    function showCardModal() { /* как было */ }
    function showSBPModal() { /* как было */ }
    function closeAllModals() { /* как было */ }
    function processWithdraw(method) { /* как было */ }

    // --- Инициализация ---
    window.onload = () => {
      if (window.Telegram?.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
      }
      loadData();
      setupWebAppDataHandler();
      renderPayouts();
      renderTasks();
      updateTimer();
    };
  </script>
</body>
</html>
